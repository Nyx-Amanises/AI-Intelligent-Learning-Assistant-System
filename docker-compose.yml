services:
  mysql:
    image: mysql:8.0
    container_name: ai-learning-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456789}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_learning_assistant}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/schema:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: ai-learning-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-learning-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: ai-learning-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ai_learning_assistant}?allowPublicKeyRetrieval=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456789}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      APP_FILE_UPLOAD_DIR: /app/uploads
      APP_AI_CONFIG_FILE: /app/runtime/ai-config.json
      APP_AI_ENABLED: ${APP_AI_ENABLED:-true}
      APP_AI_MOCK_MODE: ${APP_AI_MOCK_MODE:-true}
      APP_AI_CHAT_PROVIDER_TYPE: ${APP_AI_CHAT_PROVIDER_TYPE:-OPENAI_COMPATIBLE}
      APP_AI_BASE_URL: ${APP_AI_BASE_URL:-https://api.openai.com}
      APP_AI_CHAT_PATH: ${APP_AI_CHAT_PATH:-/v1/chat/completions}
      APP_AI_API_KEY: ${APP_AI_API_KEY:-replace-with-your-api-key}
      APP_AI_DEFAULT_MODEL: ${APP_AI_DEFAULT_MODEL:-gpt-4o-mini}
      APP_AI_EMBEDDING_PROVIDER_TYPE: ${APP_AI_EMBEDDING_PROVIDER_TYPE:-OPENAI_COMPATIBLE}
      APP_AI_EMBEDDING_BASE_URL: ${APP_AI_EMBEDDING_BASE_URL:-}
      APP_AI_EMBEDDING_PATH: ${APP_AI_EMBEDDING_PATH:-/v1/embeddings}
      APP_AI_EMBEDDING_API_KEY: ${APP_AI_EMBEDDING_API_KEY:-}
      APP_AI_DEFAULT_EMBEDDING_MODEL: ${APP_AI_DEFAULT_EMBEDDING_MODEL:-text-embedding-3-small}
      APP_QDRANT_ENABLED: ${APP_QDRANT_ENABLED:-true}
      APP_QDRANT_BASE_URL: http://qdrant:6333
      APP_QDRANT_COLLECTION_NAME: ${APP_QDRANT_COLLECTION_NAME:-material_segment_vectors}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-replace-with-your-jwt-secret-please-change-32-bytes}
    ports:
      - "${BACKEND_HOST_PORT:-8083}:8083"
    volumes:
      - backend_uploads:/app/uploads
      - ./runtime:/app/runtime

  frontend:
    build:
      context: ./frontend
    container_name: ai-learning-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  backend_uploads:

server:
  port: 8083

spring:
  application:
    name: ai-learning-assistant-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/ai_learning_assistant?allowPublicKeyRetrieval=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456789
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 5s
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  ai:
    enabled: true
    mock-mode: true
    base-url: https://api.openai.com
    chat-path: /v1/chat/completions
    api-key: replace-with-your-api-key
    default-model: gpt-4o-mini
  file:
    upload-dir: C:/Users/雪/Desktop/AI-Intelligent-Learning-Assistant-System/backend/uploads
  jwt:
    secret: replace-with-your-jwt-secret-please-change-32-bytes
    expire-hours: 24
